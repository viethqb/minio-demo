# =============================================================================
# MinIO Decommission Demo - Phase 2: Expand with Pool 2
# Pool 1: 4 nodes (minio1-4) x 4 drives = 16 drives  (will be decommissioned)
# Pool 2: 4 nodes (minio5-8) x 8 drives = 32 drives  (new pool)
# =============================================================================
#
# Usage: docker compose -f docker-compose.phase2.yml up -d
#
# This will:
#   - Restart minio1-4 with updated command (both pools in server args)
#   - Start minio5-8 as the new pool
#   - All nodes see both pools as one unified cluster

x-minio-common: &minio-common
  image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
  extra_hosts: &extra-hosts
    - "minio1:172.16.0.11"
    - "minio2:172.16.0.12"
    - "minio3:172.16.0.13"
    - "minio4:172.16.0.14"
    - "minio5:172.16.0.15"
    - "minio6:172.16.0.16"
    - "minio7:172.16.0.17"
    - "minio8:172.16.0.18"
  environment: &minio-env
    MINIO_ROOT_USER: admin
    MINIO_ROOT_PASSWORD: password123
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    interval: 30s
    timeout: 20s
    retries: 3

# The key change: ALL nodes now use the SAME command with BOTH pools:
#   http://minio{1...4}/data{1...4}   <-- Pool 1 (old, 16 drives)
#   http://minio{5...8}/data{1...8}   <-- Pool 2 (new, 32 drives)
x-server-command: &server-command
  server --console-address ":9001"
    http://minio{1...4}/data{1...4}
    http://minio{5...8}/data{1...8}

services:
  # ---------------------------------------------------------------------------
  # Pool 1: minio1 - minio4 (4 drives each) — TO BE DECOMMISSIONED
  # ---------------------------------------------------------------------------
  minio1:
    <<: *minio-common
    hostname: minio1
    container_name: minio1
    command: *server-command
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/pool1/minio1/data1:/data1
      - ./data/pool1/minio1/data2:/data2
      - ./data/pool1/minio1/data3:/data3
      - ./data/pool1/minio1/data4:/data4
    networks:
      minio_net:
        ipv4_address: 172.16.0.11

  minio2:
    <<: *minio-common
    hostname: minio2
    container_name: minio2
    command: *server-command
    volumes:
      - ./data/pool1/minio2/data1:/data1
      - ./data/pool1/minio2/data2:/data2
      - ./data/pool1/minio2/data3:/data3
      - ./data/pool1/minio2/data4:/data4
    networks:
      minio_net:
        ipv4_address: 172.16.0.12

  minio3:
    <<: *minio-common
    hostname: minio3
    container_name: minio3
    command: *server-command
    volumes:
      - ./data/pool1/minio3/data1:/data1
      - ./data/pool1/minio3/data2:/data2
      - ./data/pool1/minio3/data3:/data3
      - ./data/pool1/minio3/data4:/data4
    networks:
      minio_net:
        ipv4_address: 172.16.0.13

  minio4:
    <<: *minio-common
    hostname: minio4
    container_name: minio4
    command: *server-command
    volumes:
      - ./data/pool1/minio4/data1:/data1
      - ./data/pool1/minio4/data2:/data2
      - ./data/pool1/minio4/data3:/data3
      - ./data/pool1/minio4/data4:/data4
    networks:
      minio_net:
        ipv4_address: 172.16.0.14

  # ---------------------------------------------------------------------------
  # Pool 2: minio5 - minio8 (8 drives each) — NEW POOL
  # ---------------------------------------------------------------------------
  minio5:
    <<: *minio-common
    hostname: minio5
    container_name: minio5
    command: *server-command
    volumes:
      - ./data/pool2/minio5/data1:/data1
      - ./data/pool2/minio5/data2:/data2
      - ./data/pool2/minio5/data3:/data3
      - ./data/pool2/minio5/data4:/data4
      - ./data/pool2/minio5/data5:/data5
      - ./data/pool2/minio5/data6:/data6
      - ./data/pool2/minio5/data7:/data7
      - ./data/pool2/minio5/data8:/data8
    networks:
      minio_net:
        ipv4_address: 172.16.0.15

  minio6:
    <<: *minio-common
    hostname: minio6
    container_name: minio6
    command: *server-command
    volumes:
      - ./data/pool2/minio6/data1:/data1
      - ./data/pool2/minio6/data2:/data2
      - ./data/pool2/minio6/data3:/data3
      - ./data/pool2/minio6/data4:/data4
      - ./data/pool2/minio6/data5:/data5
      - ./data/pool2/minio6/data6:/data6
      - ./data/pool2/minio6/data7:/data7
      - ./data/pool2/minio6/data8:/data8
    networks:
      minio_net:
        ipv4_address: 172.16.0.16

  minio7:
    <<: *minio-common
    hostname: minio7
    container_name: minio7
    command: *server-command
    volumes:
      - ./data/pool2/minio7/data1:/data1
      - ./data/pool2/minio7/data2:/data2
      - ./data/pool2/minio7/data3:/data3
      - ./data/pool2/minio7/data4:/data4
      - ./data/pool2/minio7/data5:/data5
      - ./data/pool2/minio7/data6:/data6
      - ./data/pool2/minio7/data7:/data7
      - ./data/pool2/minio7/data8:/data8
    networks:
      minio_net:
        ipv4_address: 172.16.0.17

  minio8:
    <<: *minio-common
    hostname: minio8
    container_name: minio8
    command: *server-command
    volumes:
      - ./data/pool2/minio8/data1:/data1
      - ./data/pool2/minio8/data2:/data2
      - ./data/pool2/minio8/data3:/data3
      - ./data/pool2/minio8/data4:/data4
      - ./data/pool2/minio8/data5:/data5
      - ./data/pool2/minio8/data6:/data6
      - ./data/pool2/minio8/data7:/data7
      - ./data/pool2/minio8/data8:/data8
    networks:
      minio_net:
        ipv4_address: 172.16.0.18

  # ---------------------------------------------------------------------------
  # MinIO Client
  # ---------------------------------------------------------------------------
  mc:
    container_name: mc
    image: quay.io/minio/mc:latest
    depends_on:
      minio1:
        condition: service_healthy
      minio5:
        condition: service_healthy
    networks:
      minio_net:
    entrypoint: >
      /bin/sh -c "
      echo '==> Configuring mc alias...';
      mc alias set myminio http://minio1:9000 admin password123;
      echo '==> Done. Cluster has 2 pools:';
      echo '    Pool 1: minio{1..4} x 4 drives (16 drives)';
      echo '    Pool 2: minio{5..8} x 8 drives (32 drives)';
      echo '==> Run: docker exec -it mc /bin/sh';
      tail -f /dev/null
      "

networks:
  minio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/24
